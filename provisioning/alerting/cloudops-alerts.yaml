  - orgId: 1
    name: "CPU usage high over half hour"
    folder: "General Alerting"
    interval: "300s"
    rules:
      - uid: "cloudops-cpu-usage-high-over-half-hour"
        title: "CPU usage high over half hour"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-datasource-uid
            model:
              datasource:
                type: prometheus
                uid: prometheus-datasource-uid
              expr: "sum by(instance)  (irate(node_cpu{mode!='idle'}[5m]))/(count(count(node_cpu) without (mode)) by (instance)) or sum by (instance)  (irate(node_cpu_seconds_total{mode!='idle'}[5m]))/(count(count(node_cpu_seconds_total) without (mode)) by (instance))"
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 3
