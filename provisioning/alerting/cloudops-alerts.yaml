                uid: __expr__
              expression: A
              reducer: "last"
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              expression: "$B > 0"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
