apiVersion: 1

groups:
  - orgId: 1
    name: "1 Day Cert Expiry"
    folder: "General Alerting"
    interval: "14400s"
    rules:
      - uid: "cloudops-1-day-cert-expiry"
        title: "1 Day Cert Expiry"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-datasource-uid
            model:
              datasource:
                type: prometheus
                uid: prometheus-datasource-uid
              expr: "(probe_ssl_earliest_cert_expiry - time())/60/60/24"
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 3
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: "last"
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: "last"
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              expression: "$B < 1"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: math
        noDataState: "OK"
        execErrState: "OK"
        for: "4h"
        labels:
          managed-by: grafana-docker
          source: cloudops
          notification: ""
          validator: "B < 1"
          xops-alerting-class: "Certs"
          xops-alerting-docs: ""
          xops-alerting-impact: "infra"
          xops-alerting-priority: "P3"
        annotations:
          summary: "1 Day Cert Expiry"
          description: ""
        isPaused: false

