apiVersion: 1

providers:
  - name: "system-provider"
    orgId: 1
    folder: ""
    type: file
    allowUiUpdates: true
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true

  - name: "ops-provider"
    orgId: 1
    folder: "Ops"
    type: file
    allowUiUpdates: true
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards-ops
